name: inventario_cf
description: "Gestión de inventario cuarto frío - Aves en canal y menudencias"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0
  provider: ^6.1.2
  intl: ^0.19.0
  uuid: ^4.4.0
  fl_chart: ^0.69.0
  pdf: ^3.10.8
  printing: ^5.12.0
  firebase_storage: ^12.3.8
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
